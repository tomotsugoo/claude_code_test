<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スネーク - Claude ミニゲーム集</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a0a2e; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
    a.back { position: fixed; top: 10px; left: 10px; color: #f9c74f; font-size: 0.8rem; text-decoration: none; background: #12082a; padding: 4px 10px; border-radius: 6px; border: 1px solid #2e1a52; }
    h1 { font-size: 1.5rem; color: #f9c74f; margin-bottom: 0.5rem; }
    #info { color: #aaa; font-size: 0.9rem; margin-bottom: 1rem; display: flex; gap: 1.5rem; }
    #info span { color: #fff; font-weight: bold; }
    canvas { border: 2px solid #2e1a52; border-radius: 8px; display: block; }
    #msg { margin-top: 1rem; font-size: 1rem; color: #f9c74f; min-height: 1.5rem; text-align: center; }
    button { margin-top: 0.8rem; padding: 0.5rem 1.5rem; background: #2e1a52; color: #fff; border: 1px solid #f9c74f; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
    button:hover { background: #3d2466; }
    #controls { margin-top: 0.8rem; color: #555; font-size: 0.78rem; }
  </style>
</head>
<body>
<a class="back" href="../index.html">← TOP</a>
<h1>🐍 スネーク</h1>
<div id="info">スコア: <span id="score">0</span>&nbsp;&nbsp;最高: <span id="best">0</span></div>
<canvas id="c" width="400" height="400"></canvas>
<div id="msg">スペースキー or ボタンでスタート</div>
<button id="btn">スタート</button>
<div id="controls">矢印キー / WASD で操作</div>

<script>
const C = document.getElementById('c');
const ctx = C.getContext('2d');
const CELL = 20, COLS = 20, ROWS = 20;
let snake, dir, nextDir, food, score, best = 0, timer, running = false;

const COLORS = { bg: '#0d0520', snake: '#D4692A', head: '#f9c74f', food: '#e76f51', grid: '#1f0f3a' };

function init() {
  snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir = {x:1,y:0}; nextDir = {x:1,y:0};
  score = 0;
  document.getElementById('score').textContent = 0;
  placeFood();
  running = true;
  clearInterval(timer);
  timer = setInterval(step, 120);
  document.getElementById('msg').textContent = '';
}

function placeFood() {
  do { food = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)}; }
  while (snake.some(s => s.x===food.x && s.y===food.y));
}

function step() {
  dir = nextDir;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
  if (head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)) {
    gameOver(); return;
  }
  snake.unshift(head);
  if (head.x===food.x && head.y===food.y) {
    score++;
    if (score > best) best = score;
    document.getElementById('score').textContent = score;
    document.getElementById('best').textContent = best;
    placeFood();
  } else {
    snake.pop();
  }
  draw();
}

function gameOver() {
  clearInterval(timer); running = false;
  document.getElementById('msg').textContent = `ゲームオーバー！スコア: ${score}`;
}

function draw() {
  ctx.fillStyle = COLORS.bg;
  ctx.fillRect(0,0,C.width,C.height);
  // grid
  ctx.strokeStyle = COLORS.grid;
  ctx.lineWidth = 0.5;
  for(let i=0;i<=COLS;i++){ctx.beginPath();ctx.moveTo(i*CELL,0);ctx.lineTo(i*CELL,C.height);ctx.stroke();}
  for(let j=0;j<=ROWS;j++){ctx.beginPath();ctx.moveTo(0,j*CELL);ctx.lineTo(C.width,j*CELL);ctx.stroke();}
  // food
  ctx.fillStyle = COLORS.food;
  ctx.beginPath();
  ctx.arc(food.x*CELL+CELL/2, food.y*CELL+CELL/2, CELL/2-2, 0, Math.PI*2);
  ctx.fill();
  // snake
  snake.forEach((s,i) => {
    ctx.fillStyle = i===0 ? COLORS.head : COLORS.snake;
    ctx.beginPath();
    ctx.roundRect(s.x*CELL+1, s.y*CELL+1, CELL-2, CELL-2, 4);
    ctx.fill();
  });
}

document.addEventListener('keydown', e => {
  const map = { ArrowUp:{x:0,y:-1}, ArrowDown:{x:0,y:1}, ArrowLeft:{x:-1,y:0}, ArrowRight:{x:1,y:0},
                w:{x:0,y:-1}, s:{x:0,y:1}, a:{x:-1,y:0}, d:{x:1,y:0} };
  if (e.key === ' ') { if (!running) init(); return; }
  const d = map[e.key];
  if (d && !(d.x===-dir.x && d.y===-dir.y)) { nextDir = d; e.preventDefault(); }
});
document.getElementById('btn').addEventListener('click', init);

// initial draw
ctx.fillStyle = COLORS.bg; ctx.fillRect(0,0,C.width,C.height);
</script>
</body>
</html>
