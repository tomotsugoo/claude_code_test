<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>タイピング - Claude ミニゲーム集</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a0a2e; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 1.5rem 1rem; overflow: hidden; }
    a.back { position: fixed; top: 10px; left: 10px; color: #f9c74f; font-size: 0.8rem; text-decoration: none; background: #12082a; padding: 4px 10px; border-radius: 6px; border: 1px solid #2e1a52; z-index: 10; }
    h1 { font-size: 1.5rem; color: #f9c74f; margin-bottom: 0.3rem; }
    #info { display: flex; gap: 2rem; color: #aaa; font-size: 0.9rem; margin-bottom: 0.5rem; }
    #info span { color: #fff; font-weight: bold; }
    #field {
      width: 500px; height: 340px;
      background: #0d0520; border: 2px solid #2e1a52; border-radius: 8px;
      position: relative; overflow: hidden; margin-bottom: 0.8rem;
    }
    .word {
      position: absolute;
      color: #90e0ef; font-size: 1.1rem; font-weight: bold;
      white-space: nowrap;
    }
    .word.typed { color: #4ade80; }
    #input {
      width: 300px; padding: 0.5rem 0.8rem;
      background: #12082a; border: 2px solid #2e1a52; border-radius: 8px;
      color: #fff; font-size: 1rem; outline: none;
    }
    #input:focus { border-color: #f9c74f; }
    #msg { margin-top: 0.8rem; font-size: 1rem; color: #f9c74f; min-height: 1.5rem; }
    button { margin-top: 0.5rem; padding: 0.5rem 1.5rem; background: #2e1a52; color: #fff; border: 1px solid #f9c74f; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
    button:hover { background: #3d2466; }
    #lives { font-size: 1.1rem; }
  </style>
</head>
<body>
<a class="back" href="../index.html">← TOP</a>
<h1>⌨️ タイピング</h1>
<div id="info">スコア: <span id="score">0</span>&nbsp;&nbsp;ミス: <span id="lives">❤️❤️❤️</span></div>
<div id="field"></div>
<input id="input" type="text" placeholder="ここに入力..." autocomplete="off" spellcheck="false" disabled>
<div id="msg">ボタンを押してスタート！</div>
<button id="btn">スタート</button>

<script>
const WORDS = ['apple','cloud','python','game','music','river','space','tiger','ocean','flame',
               'clock','dream','light','stone','water','earth','night','storm','magic','stars'];
const W = 500, H = 340;
let score = 0, lives = 3, words = [], timer, running = false, speed = 0.4;

function spawnWord() {
  if (!running) return;
  const text = WORDS[Math.floor(Math.random()*WORDS.length)];
  const x = Math.random() * (W - text.length * 12);
  const el = document.createElement('div');
  el.className = 'word';
  el.textContent = text;
  el.style.left = x + 'px';
  el.style.top = '-30px';
  el.dataset.word = text;
  el.dataset.y = -30;
  document.getElementById('field').appendChild(el);
  words.push(el);
}

function gameLoop() {
  if (!running) return;
  words.forEach((w, i) => {
    let y = parseFloat(w.dataset.y) + speed;
    w.dataset.y = y;
    w.style.top = y + 'px';
    if (y > H) {
      w.remove(); words.splice(i, 1);
      lives--;
      updateLives();
      if (lives <= 0) { endGame(); return; }
    }
  });
}

function updateLives() {
  document.getElementById('lives').textContent = '❤️'.repeat(Math.max(0,lives));
}

function checkInput() {
  const val = document.getElementById('input').value.trim().toLowerCase();
  const idx = words.findIndex(w => w.dataset.word === val);
  if (idx !== -1) {
    words[idx].classList.add('typed');
    setTimeout(() => { words[idx]?.remove(); words.splice(idx,1); }, 200);
    score++;
    document.getElementById('score').textContent = score;
    speed = 0.4 + score * 0.02;
    document.getElementById('input').value = '';
  }
}

function endGame() {
  running = false;
  clearInterval(timer);
  words.forEach(w => w.remove()); words = [];
  document.getElementById('input').disabled = true;
  document.getElementById('msg').textContent = `ゲームオーバー！スコア: ${score}`;
  document.getElementById('btn').textContent = 'もう一度';
  document.getElementById('btn').style.display = '';
}

function startGame() {
  document.getElementById('field').innerHTML = '';
  words = []; score = 0; lives = 3; speed = 0.4;
  document.getElementById('score').textContent = 0;
  updateLives();
  document.getElementById('msg').textContent = '';
  document.getElementById('btn').style.display = 'none';
  document.getElementById('input').disabled = false;
  document.getElementById('input').focus();
  running = true;
  clearInterval(timer);
  timer = setInterval(() => { gameLoop(); }, 16);
  setInterval(() => { if(running) spawnWord(); }, 2000);
}

document.getElementById('btn').addEventListener('click', startGame);
document.getElementById('input').addEventListener('input', checkInput);
</script>
</body>
</html>
