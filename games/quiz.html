<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>雑学クイズ - Claude ミニゲーム集</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a0a2e; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 2rem 1rem; }
    a.back { position: fixed; top: 10px; left: 10px; color: #f9c74f; font-size: 0.8rem; text-decoration: none; background: #12082a; padding: 4px 10px; border-radius: 6px; border: 1px solid #2e1a52; }
    h1 { font-size: 1.5rem; color: #f9c74f; margin-bottom: 0.3rem; }
    #progress { color: #aaa; font-size: 0.9rem; margin-bottom: 1.2rem; }
    #progress span { color: #fff; font-weight: bold; }
    #question-box {
      background: #12082a; border: 1px solid #2e1a52; border-radius: 12px;
      padding: 1.5rem; max-width: 480px; width: 100%;
      margin-bottom: 1.2rem;
    }
    #question { font-size: 1.1rem; line-height: 1.6; min-height: 3rem; }
    #choices { display: flex; flex-direction: column; gap: 0.7rem; max-width: 480px; width: 100%; }
    .choice {
      padding: 0.7rem 1rem; border-radius: 8px;
      background: #1f0f3a; border: 1px solid #2e1a52;
      cursor: pointer; font-size: 0.95rem; text-align: left;
      transition: background 0.15s, border-color 0.15s;
    }
    .choice:hover:not(:disabled) { background: #2e1a52; border-color: #f9c74f; }
    .choice.correct { background: #16a34a33; border-color: #4ade80; color: #4ade80; }
    .choice.wrong   { background: #991b1b33; border-color: #f87171; color: #f87171; }
    #feedback { min-height: 1.5rem; font-size: 0.95rem; margin-top: 0.4rem; color: #f9c74f; text-align: center; max-width: 480px; }
    #next-btn {
      margin-top: 0.8rem; padding: 0.5rem 1.5rem;
      background: #2e1a52; color: #fff; border: 1px solid #f9c74f;
      border-radius: 6px; cursor: pointer; font-size: 0.9rem;
      display: none;
    }
    #next-btn:hover { background: #3d2466; }
    #result { text-align: center; max-width: 480px; display: none; }
    #result h2 { font-size: 1.6rem; color: #f9c74f; margin-bottom: 0.5rem; }
    #result p { color: #aaa; margin-bottom: 1rem; }
    #result .big { font-size: 2rem; font-weight: bold; color: #fff; }
    #restart { padding: 0.5rem 1.5rem; background: #2e1a52; color: #fff; border: 1px solid #f9c74f; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
    #restart:hover { background: #3d2466; }
  </style>
</head>
<body>
<a class="back" href="../index.html">← TOP</a>
<h1>❓ 雑学クイズ</h1>
<div id="progress">問題 <span id="qnum">1</span> / 10</div>
<div id="question-box"><div id="question"></div></div>
<div id="choices"></div>
<div id="feedback"></div>
<button id="next-btn">次の問題 →</button>
<div id="result">
  <h2>結果発表！</h2>
  <div class="big" id="final-score"></div>
  <p id="final-msg"></p>
  <button id="restart">もう一度</button>
</div>

<script>
const ALL_QUESTIONS = [
  { q:'日本で一番高い山は？', choices:['富士山','白山','槍ヶ岳','北岳'], ans:0 },
  { q:'水の化学式は？', choices:['CO₂','H₂O','NaCl','O₂'], ans:1 },
  { q:'1年は何日？', choices:['354日','365日','366日','360日'], ans:1 },
  { q:'太陽系で一番大きな惑星は？', choices:['土星','天王星','木星','海王星'], ans:2 },
  { q:'「モナ・リザ」を描いたのは誰？', choices:['モネ','ピカソ','ダ・ヴィンチ','ゴッホ'], ans:2 },
  { q:'光の速さは秒速約何km？', choices:['30万km','3万km','300万km','3000km'], ans:0 },
  { q:'人間の体で最も大きな臓器は？', choices:['肝臓','心臓','皮膚','肺'], ans:2 },
  { q:'オリンピックは何年ごとに開催？', choices:['2年','3年','4年','5年'], ans:2 },
  { q:'「吾輩は猫である」の作者は？', choices:['芥川龍之介','夏目漱石','太宰治','川端康成'], ans:1 },
  { q:'地球から一番近い恒星（太陽を除く）は？', choices:['シリウス','ベガ','プロキシマ・ケンタウリ','アンタレス'], ans:2 },
  { q:'円周率πの最初の3桁は？', choices:['3.14','3.12','3.16','3.11'], ans:0 },
  { q:'日本の国鳥は？', choices:['鶴','鷹','雉','白鳥'], ans:2 },
  { q:'世界で一番長い川は？', choices:['アマゾン川','ナイル川','長江','ミシシッピ川'], ans:1 },
  { q:'音の速さ（気温15℃）は秒速約何m？', choices:['340m','240m','440m','140m'], ans:0 },
  { q:'元素記号「Au」は何の元素？', choices:['銀','銅','金','鉄'], ans:2 },
];

function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

let questions, current, score, answered;

function init() {
  questions = shuffle(ALL_QUESTIONS).slice(0,10);
  current = 0; score = 0;
  document.getElementById('result').style.display = 'none';
  document.getElementById('question-box').style.display = '';
  document.getElementById('choices').style.display = '';
  document.getElementById('progress').style.display = '';
  showQuestion();
}

function showQuestion() {
  answered = false;
  const q = questions[current];
  document.getElementById('qnum').textContent = current+1;
  document.getElementById('question').textContent = q.q;
  document.getElementById('feedback').textContent = '';
  document.getElementById('next-btn').style.display = 'none';
  const el = document.getElementById('choices');
  el.innerHTML = '';
  q.choices.forEach((c,i) => {
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.textContent = `${['①','②','③','④'][i]} ${c}`;
    btn.addEventListener('click', () => answer(i, btn, q));
    el.appendChild(btn);
  });
}

function answer(i, btn, q) {
  if(answered) return;
  answered = true;
  document.querySelectorAll('.choice').forEach(b=>b.disabled=true);
  if(i===q.ans) {
    btn.classList.add('correct');
    document.getElementById('feedback').textContent = '⭕ 正解！';
    score++;
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.choice')[q.ans].classList.add('correct');
    document.getElementById('feedback').textContent = `❌ 不正解。正解は「${q.choices[q.ans]}」`;
  }
  if(current<9) {
    document.getElementById('next-btn').style.display = '';
  } else {
    setTimeout(showResult, 900);
  }
}

function showResult() {
  document.getElementById('question-box').style.display = 'none';
  document.getElementById('choices').style.display = 'none';
  document.getElementById('progress').style.display = 'none';
  document.getElementById('feedback').textContent = '';
  document.getElementById('next-btn').style.display = 'none';
  document.getElementById('result').style.display = '';
  document.getElementById('final-score').textContent = `${score} / 10`;
  const msgs = ['もう少し頑張ろう！','なかなかいい！','すごい！','完璧！🎉'];
  const idx = score<=3?0:score<=6?1:score<=9?2:3;
  document.getElementById('final-msg').textContent = msgs[idx];
}

document.getElementById('next-btn').addEventListener('click', () => {
  current++;
  showQuestion();
});
document.getElementById('restart').addEventListener('click', init);
init();
</script>
</body>
</html>
