<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>神経衰弱 - Claude ミニゲーム集</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a0a2e; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 2rem 1rem; }
    a.back { position: fixed; top: 10px; left: 10px; color: #f9c74f; font-size: 0.8rem; text-decoration: none; background: #12082a; padding: 4px 10px; border-radius: 6px; border: 1px solid #2e1a52; }
    h1 { font-size: 1.5rem; color: #f9c74f; margin-bottom: 0.4rem; }
    #info { color: #aaa; font-size: 0.9rem; margin-bottom: 1.2rem; }
    #info span { color: #fff; font-weight: bold; }
    #grid { display: grid; grid-template-columns: repeat(4,80px); gap: 10px; }
    .card {
      width: 80px; height: 80px; border-radius: 8px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 2rem;
      background: #2e1a52; border: 2px solid #3d2466;
      transition: transform 0.15s;
      user-select: none;
    }
    .card:hover:not(.flipped):not(.matched) { transform: scale(1.05); border-color: #f9c74f; }
    .card.flipped, .card.matched { background: #12082a; border-color: #90e0ef; }
    .card.matched { border-color: #4ade80; opacity: 0.7; }
    #msg { margin-top: 1.2rem; font-size: 1rem; color: #f9c74f; min-height: 1.5rem; }
    button { margin-top: 0.8rem; padding: 0.5rem 1.5rem; background: #2e1a52; color: #fff; border: 1px solid #f9c74f; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
    button:hover { background: #3d2466; }
  </style>
</head>
<body>
<a class="back" href="../index.html">← TOP</a>
<h1>🃏 神経衰弱</h1>
<div id="info">手数: <span id="moves">0</span> &nbsp; ペア: <span id="pairs">0</span>/8</div>
<div id="grid"></div>
<div id="msg"></div>
<button id="btn">リセット</button>

<script>
const EMOJIS = ['🍪','🐍','⚡','🔢','🧱','✊','❓','🎯'];
let cards = [], flipped = [], matched = 0, moves = 0, lock = false;

function shuffle(arr) {
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}

function init() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  cards = []; flipped = []; matched = 0; moves = 0; lock = false;
  document.getElementById('moves').textContent = 0;
  document.getElementById('pairs').textContent = 0;
  document.getElementById('msg').textContent = '';
  const deck = shuffle([...EMOJIS,...EMOJIS]);
  deck.forEach((emoji, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.emoji = emoji;
    el.dataset.idx = i;
    el.textContent = '？';
    el.addEventListener('click', () => flip(el));
    grid.appendChild(el);
    cards.push(el);
  });
}

function flip(el) {
  if (lock || el.classList.contains('flipped') || el.classList.contains('matched')) return;
  el.classList.add('flipped');
  el.textContent = el.dataset.emoji;
  flipped.push(el);
  if (flipped.length === 2) {
    moves++;
    document.getElementById('moves').textContent = moves;
    lock = true;
    if (flipped[0].dataset.emoji === flipped[1].dataset.emoji) {
      flipped.forEach(c => c.classList.add('matched'));
      matched++;
      document.getElementById('pairs').textContent = matched;
      flipped = []; lock = false;
      if (matched === 8) document.getElementById('msg').textContent = `クリア！ ${moves}手でした🎉`;
    } else {
      setTimeout(() => {
        flipped.forEach(c => { c.classList.remove('flipped'); c.textContent = '？'; });
        flipped = []; lock = false;
      }, 800);
    }
  }
}

document.getElementById('btn').addEventListener('click', init);
init();
</script>
</body>
</html>
