<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>モグラたたき - Claude ミニゲーム集</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a0a2e; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 2rem 1rem; }
    a.back { position: fixed; top: 10px; left: 10px; color: #f9c74f; font-size: 0.8rem; text-decoration: none; background: #12082a; padding: 4px 10px; border-radius: 6px; border: 1px solid #2e1a52; }
    h1 { font-size: 1.5rem; color: #f9c74f; margin-bottom: 0.4rem; }
    #info { display: flex; gap: 2rem; color: #aaa; font-size: 0.95rem; margin-bottom: 1.2rem; }
    #info span { color: #fff; font-weight: bold; }
    #field {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      gap: 14px;
    }
    .hole {
      width: 110px; height: 110px;
      background: #0d0520;
      border-radius: 50%;
      border: 4px solid #2e1a52;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      overflow: hidden;
      position: relative;
    }
    .hole svg {
      width: 70px; height: 77px;
      image-rendering: pixelated;
      transition: transform 0.1s;
      transform: translateY(100%);
      position: absolute;
      bottom: 0;
    }
    .hole.up svg { transform: translateY(10%); }
    .hole.hit svg { transform: translateY(100%); }
    #msg { margin-top: 1rem; font-size: 1rem; color: #f9c74f; min-height: 1.5rem; }
    #timer-bar-wrap { width: 300px; height: 10px; background: #2e1a52; border-radius: 5px; margin-bottom: 0.8rem; }
    #timer-bar { height: 100%; background: #f9c74f; border-radius: 5px; width: 100%; transition: width 0.1s linear; }
    button { padding: 0.5rem 1.5rem; background: #2e1a52; color: #fff; border: 1px solid #f9c74f; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
    button:hover { background: #3d2466; }
    .float-score {
      position: fixed; font-size: 1.2rem; font-weight: bold; color: #f9c74f;
      pointer-events: none; animation: floatUp 0.8s ease-out forwards; z-index: 100;
    }
    @keyframes floatUp { 0%{opacity:1;transform:translateY(0)} 100%{opacity:0;transform:translateY(-50px)} }
  </style>
</head>
<body>
<a class="back" href="../index.html">← TOP</a>
<h1>🔨 モグラたたき</h1>
<div id="info">スコア: <span id="score">0</span>&nbsp;&nbsp;最高: <span id="best">0</span></div>
<div id="timer-bar-wrap"><div id="timer-bar"></div></div>
<div id="field"></div>
<div id="msg">ボタンを押してスタート！</div>
<button id="btn" style="margin-top:0.8rem">スタート</button>

<script>
const CLAUDE_SVG = `<svg viewBox="0 0 10 11" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <rect x="2" y="0" width="2" height="1" fill="#D4692A"/>
  <rect x="6" y="0" width="2" height="1" fill="#D4692A"/>
  <rect x="0" y="1" width="2" height="3" fill="#D4692A"/>
  <rect x="2" y="1" width="6" height="6" fill="#D4692A"/>
  <rect x="8" y="1" width="2" height="3" fill="#D4692A"/>
  <rect x="3" y="5" width="1" height="1" fill="#1a0a00"/>
  <rect x="6" y="5" width="1" height="1" fill="#1a0a00"/>
  <rect x="1" y="7" width="2" height="3" fill="#D4692A"/>
  <rect x="1" y="10" width="1" height="1" fill="#D4692A"/>
  <rect x="4" y="7" width="2" height="3" fill="#D4692A"/>
  <rect x="5" y="10" width="1" height="1" fill="#D4692A"/>
  <rect x="7" y="7" width="2" height="3" fill="#D4692A"/>
  <rect x="7" y="10" width="1" height="1" fill="#D4692A"/>
  <rect x="3" y="2" width="4" height="2" fill="#E8834A" opacity="0.5"/>
</svg>`;

const DURATION = 30000;
let score = 0, best = 0, holes = [], timers = [], running = false, startTime, rafId;

function buildField() {
  const field = document.getElementById('field');
  field.innerHTML = '';
  holes = [];
  for (let i = 0; i < 9; i++) {
    const div = document.createElement('div');
    div.className = 'hole';
    div.innerHTML = CLAUDE_SVG;
    div.addEventListener('click', (e) => whack(i, e));
    field.appendChild(div);
    holes.push(div);
  }
}

function whack(i, e) {
  if (!running || !holes[i].classList.contains('up')) return;
  score++;
  document.getElementById('score').textContent = score;
  if (score > best) { best = score; document.getElementById('best').textContent = best; }
  holes[i].classList.remove('up');
  holes[i].classList.add('hit');
  setTimeout(() => holes[i].classList.remove('hit'), 300);

  const ft = document.createElement('div');
  ft.className = 'float-score';
  ft.textContent = '+1';
  ft.style.left = (e.clientX - 10) + 'px';
  ft.style.top  = (e.clientY - 10) + 'px';
  document.body.appendChild(ft);
  setTimeout(() => ft.remove(), 800);
}

function popUp() {
  if (!running) return;
  const available = holes.map((h,i)=>i).filter(i=>!holes[i].classList.contains('up'));
  if (!available.length) return;
  const idx = available[Math.floor(Math.random()*available.length)];
  holes[idx].classList.add('up');
  const delay = Math.max(600, 1200 - score * 20);
  const t = setTimeout(() => { holes[idx].classList.remove('up'); }, delay);
  timers.push(t);
  const next = Math.max(300, 900 - score * 15);
  timers.push(setTimeout(popUp, next));
}

function updateBar() {
  const elapsed = Date.now() - startTime;
  const pct = Math.max(0, 1 - elapsed / DURATION);
  document.getElementById('timer-bar').style.width = (pct * 100) + '%';
  if (pct > 0) { rafId = requestAnimationFrame(updateBar); }
  else { endGame(); }
}

function endGame() {
  running = false;
  timers.forEach(clearTimeout);
  holes.forEach(h => h.classList.remove('up','hit'));
  document.getElementById('msg').textContent = `終了！スコア: ${score} 🎉`;
  document.getElementById('btn').textContent = 'もう一度';
  document.getElementById('btn').style.display = '';
}

function startGame() {
  buildField();
  score = 0;
  document.getElementById('score').textContent = 0;
  document.getElementById('msg').textContent = '';
  document.getElementById('btn').style.display = 'none';
  timers = []; running = true;
  startTime = Date.now();
  cancelAnimationFrame(rafId);
  updateBar();
  popUp();
}

document.getElementById('btn').addEventListener('click', startGame);
buildField();
</script>
</body>
</html>
